<!DOCTYPE html>
<html lang="eng">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A.Y.I BOOKMARK</title>
  </head>
  <body>
    <h1 class="main-title">A.Y.I BOOKMARK</h1>
    <!--DROPDOWN PERSON B-->
  <div class="user-dropdown">
    <label for="user-select">Select User:</label>
    <select name="user-id" id="user-select">
      <option value="all">--Pick A User--</option>
    </select>
  </div>
  </div>
    <!--FORM PERSON B-->
    <form id="bookmark-form">
      <label for="input-title">Title</label>
      <input type="text" id="input-title" required/>

      <label for="input-url">URL</label>
      <input type="url" id="input-url" required/>

      <label for="input-desc">Description</label>
      <input type="text" id="input-desc" required/>
    
      <button type ="submit">Add Bookmark</button>
    </form>

    <!-- BOOKMARK LIST PERSON C-->
    <div id="bookmark-list"></div>
    
    <script type="module" src="script.js"></script>
  </body>
</html>
