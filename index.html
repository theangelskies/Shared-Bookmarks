<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A.Y.I SHARED BOOKMARK</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- HEADER -->
    <header class="website-header">
      <h1 class="main-title">
        <a href="#" id="home-link">A.Y.I SHARED BOOKMARK</a>
      </h1>

      <!--DROPDOWN -->
      <div class="user-selector">
        <label for="user-select">Viewing as</label>
        <select name="user-id" id="user-select">
          <option value="" disabled selected>-- Pick A User --</option>
        </select>
      </div>

      <nav class="navigations">
        <a href="about.html">
          <button type="button">About</button>
        </a>
        <a href="contact.html"><button type="button">Contact</button></a>
      </nav>
    </header>
    
    <main>
      <!--FORM-->
      <button id="toggle-btn">👇 Create New Bookmark</button>
      <div id="form-container" class="hidden">
        <form id="bookmark-form" class="bookmark-form">
          <div class="form-group">
            <label for="title">Title:</label>
            <input type="text" id="title" name="title" required />
          </div>
          <div class="form-group">
            <label for="url">URL:</label>
            <input type="url" id="url" name="url" required />
          </div>
          <div class="form-group">
            <label for="description">Description:</label>
            <textarea id="description" name="description" required></textarea>
          </div>
          <div class="form-group">
            <button type="submit">Add Bookmark</button>
          </div>
        </form>
      </div>

      <!-- BOOKMARK LIST-->
      <div id="bookmark-list"></div>
    </main>
    <script type="module" src="script.js"></script>
    <footer>
      <p>
        &copy; 2026 A.Y.I SHARED BOOKMARK, GROUP PROJECT. All rights reserved.
      </p>
    </footer>
  </body>
</html>
